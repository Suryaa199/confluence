name: CI (Windows build)

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      DOTNET_NOLOGO: true
      DOTNET_CLI_TELEMETRY_OPTOUT: 1
      NUGET_XMLDOC_MODE: skip
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: NuGet cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}-${{ hashFiles('global.json', 'NuGet.config') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Dotnet info
        run: |
          dotnet --info
          dotnet --list-sdks
          dotnet --list-runtimes

      - name: Restore
        run: dotnet restore InterviewCopilot.sln --nologo -v minimal

      - name: Build
        run: |
          New-Item -ItemType Directory -Force -Path binlog | Out-Null
          dotnet build InterviewCopilot.sln -c Release --no-restore /m /p:ContinuousIntegrationBuild=true -v minimal /bl:binlog/build.binlog

      - name: Publish (win-x64 self-contained)
        run: |
          $out = "dist/win-x64"
          dotnet publish src/InterviewCopilot/InterviewCopilot.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:PublishTrimmed=true -v minimal --nologo -o $out
          Get-ChildItem $out -Recurse | Write-Host

      - name: Smoke test
        run: |
          pwsh -File scripts/smoke.ps1 -Configuration Release -Runtime win-x64 -Project src/InterviewCopilot/InterviewCopilot.csproj -Solution InterviewCopilot.sln -Output dist/win-x64 -MinSizeMB 20

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: InterviewCopilot-win-x64
          path: dist/win-x64/**
          if-no-files-found: error

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            binlog/**
          if-no-files-found: warn
